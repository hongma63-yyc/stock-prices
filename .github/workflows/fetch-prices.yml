name: Fetch daily prices
on:
  schedule:
    - cron: '0 21 * * 1-5'      # weekdays, after US & TSX market close (GitHub often delays this)
  workflow_dispatch:            # lets you run it by hand too
  push:
    paths:
      - 'refresh.txt'           # Mac pokes this in the evening to fetch same-day close on demand
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance
      - name: Fetch prices
        run: |
          python - <<'EOF'
          import yfinance as yf, csv
          tickers = [t.strip() for t in open('tickers.txt') if t.strip() and not t.startswith('#')]
          rows = []
          for t in tickers:
              try:
                  h = yf.Ticker(t).history(period='5d')
                  if len(h):
                      rows.append((t, round(float(h['Close'].iloc[-1]),4), h.index[-1].strftime('%Y-%m-%d')))
                  else:
                      rows.append((t,'',''))
              except Exception:
                  rows.append((t,'',''))
          with open('prices.csv','w',newline='') as f:
              w = csv.writer(f); w.writerow(['ticker','close','price_date'])
              w.writerows(rows)
          print('Wrote', len(rows), 'rows')
          EOF
      - name: Commit prices
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add prices.csv
          git commit -m "Update prices" || { echo "no changes to commit"; exit 0; }
          # Pull-rebase + retry so a concurrent push (another workflow, the Mac
          # pusher, or a manual push) can't reject us with "fetch first".
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push race on attempt $i, retrying..."; sleep $((RANDOM % 8 + 3))
          done
          echo "push still failing after 5 attempts"; exit 1
